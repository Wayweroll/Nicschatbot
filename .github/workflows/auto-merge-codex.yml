name: Auto-merge Codex PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'codex/') && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequestId = context.payload.pull_request.node_id;

            try {
              await github.graphql(`
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }
              `, { pullRequestId });

              core.info(`Auto-merge enabled for PR #${context.payload.pull_request.number}`);
            } catch (error) {
              const message = error?.message || String(error);
              core.warning(`Could not enable auto-merge for PR #${context.payload.pull_request.number}: ${message}`);
              core.notice("Skipping auto-merge enablement. Merge manually or enable repository auto-merge settings.");
            }
